<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Post a Job | FIX-IT</title>
  <link rel="stylesheet" href="assets/css/post.css">
  <link rel="stylesheet" href="assets/css/toast.css">
  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
  <link href="https://cdn.boxicons.com/3.0.8/fonts/basic/boxicons.min.css" rel="stylesheet">
  <link href="https://cdn.boxicons.com/3.0.8/fonts/filled/boxicons-filled.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

  <!-- ALL content hidden until auth check passes -->
  <div id="page-content" style="display: none;">
    <video autoplay loop muted playsinline class="background-clip">
      <source src="assets/videos/po.mp4" type="video/mp4">
    </video>

    <a href="index.html" class="back-btn">⬅ Back</a>

    <!-- Job form container -->
    <div class="container" id="job-container">
    <h2>Post a Job</h2>
    <form id="jobForm">
      <label>Job Title</label>
      <input type="text" id="title" placeholder="e.g. Need a Plumber">
      <div class="error" id="titleError"></div>

      <label>Description</label>
      <textarea id="description" placeholder="Describe the task..."></textarea>
      <div class="error" id="descError"></div>

      <label>Category</label>
      <select id="category">
        <option value="">Select Category</option>
        <option>Plumbing</option>
        <option>Electrical</option>
        <option>Cleaning</option>
        <option>Web Development</option>
        <option>Other</option>
      </select>
      <div class="error" id="catError"></div>

      <label>Budget ($)</label>
      <input type="number" id="budget" placeholder="Enter amount">
      <div class="error" id="budgetError"></div>

      <label>Deadline</label>
      <input type="date" id="deadline">
      <div class="error" id="dateError"></div>

      <button type="submit">Post Job</button>
    </form>
    <div class="success" id="successMsg"></div>
  </div>
  </div> <!-- /page-content -->

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/supabase-init.js"></script>
  <script>
    // ============================================
    // Access Control: Only Clients can post jobs
    // ============================================
    (async () => {
      const user = await getCurrentUser();

      if (!user) {
        // Not logged in — show must-login overlay
        showAccessDenied(
          'Login Required',
          'You need to login first to post a job. Create an account or login to continue.',
          'bxs-lock-alt',
          [
            { text: 'Login Now', href: 'login.html', cls: 'primary' },
            { text: 'Go Home', href: 'index.html', cls: 'secondary' }
          ]
        );
        return;
      }

      const profile = await getUserProfile(user.id);
      const userType = profile?.user_type;

      if (userType !== 'Client') {
        // Worker trying to access — show denied overlay
        showAccessDenied(
          'Access Denied',
          'Only Clients can post jobs. As a Worker, you can browse and apply for available jobs instead.',
          'bxs-shield-x',
          [
            { text: 'Find Work', href: '#', cls: 'primary' },
            { text: 'Go Home', href: 'index.html', cls: 'secondary' }
          ]
        );
        return;
      }

      // Client — show the entire page
      document.getElementById('page-content').style.display = '';
    })();

    function showAccessDenied(title, message, icon, buttons) {
      const overlay = document.createElement('div');
      overlay.className = 'access-denied-overlay';

      let btnsHtml = buttons.map(b =>
        `<a href="${b.href}" class="ad-btn ${b.cls}">${b.text}</a>`
      ).join('');

      overlay.innerHTML = `
        <div class="access-denied-card">
          <div class="ad-icon"><i class='bx ${icon}'></i></div>
          <h2>${title}</h2>
          <p>${message}</p>
          <div>${btnsHtml}</div>
        </div>
      `;
      document.body.appendChild(overlay);
    }

    // ============================================
    // Job Form Validation (existing logic)
    // ============================================
    const form = document.getElementById("jobForm");
    form.addEventListener("submit", function (e) {
      e.preventDefault();

      let title = document.getElementById("title").value.trim();
      let desc = document.getElementById("description").value.trim();
      let category = document.getElementById("category").value;
      let budget = document.getElementById("budget").value;
      let deadline = document.getElementById("deadline").value;

      let titleError = document.getElementById("titleError");
      let descError = document.getElementById("descError");
      let catError = document.getElementById("catError");
      let budgetError = document.getElementById("budgetError");
      let dateError = document.getElementById("dateError");
      let successMsg = document.getElementById("successMsg");

      titleError.innerHTML = "";
      descError.innerHTML = "";
      catError.innerHTML = "";
      budgetError.innerHTML = "";
      dateError.innerHTML = "";
      successMsg.innerHTML = "";

      let valid = true;

      if (title === "") { titleError.innerHTML = "Job title is required"; valid = false; }
      if (desc === "") { descError.innerHTML = "Description is required"; valid = false; }
      if (category === "") { catError.innerHTML = "Please select a category"; valid = false; }
      if (budget === "" || budget <= 0) { budgetError.innerHTML = "Enter a valid budget"; valid = false; }
      if (deadline === "") { dateError.innerHTML = "Select a deadline"; valid = false; }

      if (valid) {
        successMsg.innerHTML = "✅ Job posted successfully!";
        form.reset();
      }
    });
  </script>
</body>

</html>
