<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login To Fix-IT</title>
    <link rel="stylesheet" href="assets/css/login.css">
    <link rel="stylesheet" href="assets/css/toast.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link href="https://cdn.boxicons.com/3.0.8/fonts/basic/boxicons.min.css" rel="stylesheet">
    <!-- Filled Icons -->
    <link href="https://cdn.boxicons.com/3.0.8/fonts/filled/boxicons-filled.min.css" rel="stylesheet">
    <!-- Brand Icons -->
    <link href="https://cdn.boxicons.com/3.0.8/fonts/brands/boxicons-brands.min.css" rel="stylesheet">
</head>

<body>
    <div class="home-sci">
        <a href="index.html"><i class="bx bx-home"></i></a>
    </div>
    <div class="wrapper">
        <span class="bg-animate"></span>
        <span class="bg-animate2"></span>

        <div class="form-box login">
            <h2 class="animation" style="--i:0; --j:21;">Login</h2>
            <form action="#" id="login-form">
                <div class="input-box animation" style="--i:1; --j:22;">
                    <input type="email" id="login-email" required>
                    <label>Email</label>
                    <i class='bx bxs-envelope'></i>
                </div>
                <div class="input-box animation" style="--i:2; --j:23;">
                    <input type="password" id="login-password" required>
                    <label>Password</label>
                    <i class="bx bxs-lock-alt"></i>
                </div>
                <button type="submit" class="btn animation" style="--i:3; --j:24;">Login</button>
                <div class="logreg-link animation" style="--i:4; --j:25;">
                    <p>Don't have an account <a href="#" class="register-link">Sign Up</a></p>
                </div>
            </form>
        </div>
        <div class="info-text login">
            <h2 class="animation" style="--i:0 --j:20;">Welcome FIX-IT!</h2>
            <p class="animation" style="--i:1 --j:21;">Fast & Reliable Solutions</p>
        </div>

        <div class="form-box register">
            <h2 class="animation" style="--i:17; --j:0;">Sign Up</h2>
            <form action="#" id="register-form">
                <div class="input-box animation" style="--i:18; --j:1;">
                    <input type="text" id="reg-name" required>
                    <label>Full Name</label>
                    <i class='bx bxs-user'></i>
                </div>
                <div class="input-box animation" style="--i:18.5; --j:1.5;">
                    <input type="text" id="reg-phone" required>
                    <label>Phone (WhatsApp)</label>
                    <i class='bx bxl-whatsapp'></i>
                </div>
                <div class="input-box animation" style="--i:19; --j:2;">
                    <select id="reg-type" required style="width: 100%; height: 100%; background: transparent; border: none; outline: none; border-bottom: 2px solid #fff; font-size: 16px; color: #fff; padding: 0 35px 0 5px; -webkit-appearance: none; appearance: none; cursor: pointer;">
                        <option value="" disabled selected>Select User Type</option>
                        <option value="Client" style="color: black;">Client (I need work done)</option>
                        <option value="Worker" style="color: black;">Worker (I want to work)</option>
                    </select>
                    <i class='bx bxs-briefcase'></i>
                </div>
                <div class="input-box animation" style="--i:19.5; --j:2.5;">
                    <input type="email" id="reg-email" required>
                    <label>Email</label>
                    <i class='bx bxs-envelope'></i>
                </div>
                <div class="input-box animation" style="--i:20; --j:3;">
                    <input type="password" id="reg-password" required>
                    <label>Password</label>
                    <i class="bx bxs-lock-alt"></i>
                </div>
                <button type="submit" class="btn animation" style="--i:21; --j:4;">Sign Up</button>
                <div class="logreg-link animation" style="--i:22; --j:5;">
                    <p>Already have an account? <a href="#" class="login-link">Login</a></p>
                </div>
            </form>
        </div>
        <div class="info-text register">
            <h2 class="animation" style="--i:17; --j:0;">Welcome FIX-IT!</h2>
            <p class="animation" style="--i:18;  --j:1;">Fast & Reliable Solutions</p>
        </div>
    </div>

    <script src="assets/js/script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/js/supabase-init.js"></script>
    <script src="assets/js/auth.js"></script>
</body>

</html>
